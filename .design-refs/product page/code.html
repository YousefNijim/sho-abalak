<!DOCTYPE html>

                      "on-tertiary-fixed": "#001e30",

                      "secondary": "#296a43",

                      "surface-dim": "#dbd9e2",

                      "on-surface-variant": "#564337",
                      "on-tertiary-fixed-variant": "#004b71",
                      "inverse-on-surface": "#f2eff9",

                      "tertiary": "#006495",
                      "secondary-fixed": "#aef2bf",
                      "surface-tint": "#974800",
                      "border-beige": "#E5E0D5",
                      "muted-gray": "#6B7280",
                      "secondary-fixed-dim": "#92d5a5",
                      "inverse-primary": "#ffb688",
                      "tertiary-fixed-dim": "#8fcdff",
                      "on-primary-fixed-variant": "#733600",
                      "on-primary-container": "#4e2200",
                      "primary": "#974800",
                      "outline-variant": "#ddc1b1",
                      "surface-bright": "#fbf8ff",
                      "on-secondary-fixed-variant": "#09522d",
                      "on-secondary": "#ffffff",

                      "on-primary": "#ffffff",
                      "background": "#fbf8ff",
                      "on-surface": "#1b1b22",

                      "outline": "#8a7265",
                      "tertiary-fixed": "#cbe6ff",
                      "tertiary-container": "#009ee8",
                      "surface-container-low": "#f5f2fc",
                      "surface": "#fbf8ff",
                      "success-green": "#22C55E"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "section-md": "24px",
                      "gap-lg": "20px",
                      "nav-height": "64px",
                      "gap-md": "12px",
                      "gap-sm": "8px",
                      "margin-standard": "16px",
                      "section-lg": "32px",
                      "base": "4px",
                      "gap-xs": "4px"
              },
              "fontFamily": {

                      "label-md": ["Montserrat"],

                      "label-md": ["13px", {"lineHeight": "18px", "fontWeight": "500"}],
                      "headline-lg-mobile": ["26px", {"lineHeight": "34px", "fontWeight": "700"}],
                      "headline-lg": ["30px", {"lineHeight": "40px", "fontWeight": "700"}],
                      "hero-lg": ["38px", {"lineHeight": "1.2", "fontWeight": "800"}],
                      "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "button-text": ["16px", {"lineHeight": "24px", "fontWeight": "700"}],
                      "label-sm": ["11px", {"lineHeight": "16px", "fontWeight": "500"}],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-cream text-on-surface font-body-base antialiased">
<!-- Top AppBar Navigation Shell -->
<header class="w-full top-0 sticky z-50 flex items-center justify-between px-margin-standard h-nav-height transition-all duration-300" id="top-nav">
<button aria-label="Back" class="bg-surface-white/80 backdrop-blur-md p-2 rounded-full shadow-sm hover:opacity-80 active:scale-95 duration-150 text-primary">
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<h1 class="font-headline-sm text-headline-sm-mobile text-primary opacity-0 transition-opacity duration-300" id="header-title">منسف فلسطيني ملكي</h1>
<button class="bg-surface-white/80 backdrop-blur-md p-2 rounded-full shadow-sm hover:opacity-80 active:scale-95 duration-150 text-primary" onclick="toggleFavorite(this)">
<span class="material-symbols-outlined" data-icon="favorite">favorite</span>
</button>
</header>
<main class="-mt-nav-height pb-32">
<!-- Hero Section -->
<section class="h-[397px] w-full relative overflow-hidden">
<img alt="Mansaf Dish" class="w-full h-full object-cover" data-alt="A top-down professional food photograph of a traditional Palestinian Mansaf dish served on a large platter. The dish features tender chunks of lamb cooked in a rich, creamy white jameed sauce, spread over a generous bed of yellow turmeric rice. Topped with a sprinkle of golden fried almonds and fresh green parsley, the scene is bathed in warm, natural sunlight that highlights the textures of the meat and grain, creating an appetizing, authentic heritage aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBlNLktitRdlAX15e-zUdbFvwAlRpWZQC2uXKzvekRWUoKiAQ9ZmVpgZXlZQ6LxkNc5mSDjKbtqT4aUuqVBBzXiXTk3Ae12Q_an56DEuUcTv_98xKUM7FMyr-rQ8NbnmUbvrF8kDMz1VqQXPa3w7niKtkOS4hishmqa1ivDdKfS8E5ySVRfIR42BeYKou1ms-2dbZeHjPCJ5bQiBpe17oyo_u4pUNnxieTa7Anw2jMwEsx1eJ8nQzxSFLmBpRVTjEplOWDL3bzjSQnn"/>
<div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-transparent"></div>
</section>
<!-- Content Area -->
<section class="relative -mt-10 bg-surface-white rounded-t-[32px] px-margin-standard pt-8 pb-12 shadow-md min-h-[442px]">
<div class="max-w-2xl mx-auto">
<!-- Product Header -->
<div class="flex justify-between items-start mb-4">
<div>
<h2 class="font-headline-md text-headline-md-mobile text-on-surface mb-2">منسف فلسطيني ملكي</h2>
<div class="flex items-center gap-md">
<div class="flex items-center gap-xs bg-secondary/10 px-3 py-1 rounded-full">
<span class="material-symbols-outlined text-secondary text-[18px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label-md text-label-md text-secondary">4.8</span>
</div>
<span class="bg-success-green/10 text-success-green px-3 py-1 rounded-full font-label-md text-label-md">الأكثر طلباً</span>
</div>
</div>
<div class="text-left">
<span class="font-headline-md text-headline-md-mobile text-primary" id="base-price">65</span>
<span class="font-label-md text-label-md text-primary mr-1">₪</span>
</div>
</div>
<!-- Description -->
<div class="mb-section-md">
<h3 class="font-headline-sm text-[16px] text-on-surface mb-2">الوصف</h3>
<p class="font-body-base text-body-base text-muted-gray leading-relaxed">
                        لحم بلدي طازج مطهو ببطء في الجميد الكركي الأصلي لضمان نكهة غنية، يقدم على فراش من الأرز الفاخر المزين باللوز المحمص والصنوبر والخبز الشراك التقليدي. وجبة تكفي لشخص واحد بامتياز.
                    </p>
</div>
<!-- Extras/Customization Placeholder -->
<div class="space-y-gap-lg mb-section-md">
<div class="p-4 bg-background-cream/30 border border-border-beige rounded-xl">
<label class="font-headline-sm text-[15px] block mb-3">تعليمات خاصة</label>
<div class="relative">
<textarea class="w-full h-24 bg-surface-white border-1.5 border-border-beige rounded-lg p-3 text-body-base focus:border-primary-container focus:ring-0 transition-colors" placeholder="مثلاً: بدون بصل، زيادة صنوبر..."></textarea>
</div>
</div>
</div>
<!-- Quantity Selector Section -->
<div class="flex items-center justify-between py-6 border-t border-border-beige">
<span class="font-headline-sm text-[16px]">الكمية</span>
<div class="flex items-center gap-lg bg-background-cream rounded-full px-2 py-1 border border-border-beige">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-white shadow-sm text-primary active:scale-90 transition-transform" onclick="updateQty(-1)">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<span class="font-headline-sm text-headline-sm-mobile w-8 text-center" id="qty-count">1</span>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-primary text-on-primary shadow-sm active:scale-90 transition-transform" onclick="updateQty(1)">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>
</div>
</section>
</main>
<!-- Fixed Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 right-0 bg-surface-white/95 backdrop-blur-lg px-margin-standard py-5 custom-shadow-top z-50">
<div class="max-w-2xl mx-auto flex items-center gap-gap-lg">
<div class="hidden sm:flex flex-col">
<span class="text-muted-gray text-label-sm font-label-sm">المجموع الكلي</span>
<span class="font-headline-md text-primary"><span id="total-price">65</span> ₪</span>
</div>
<button class="flex-1 bg-primary text-on-primary h-[56px] rounded-xl font-button-text text-button-text shadow-md hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-gap-md">
<span class="material-symbols-outlined" data-icon="shopping_cart">shopping_cart</span>
<span>إضافة للسلة</span>
<span class="sm:hidden mx-2">•</span>
<span class="sm:hidden"><span id="total-price-mobile">65</span> ₪</span>
</button>
</div>
</footer>
<script>
        let quantity = 1;
        const basePrice = 65;

        function updateQty(val) {
            quantity = Math.max(1, quantity + val);
            document.getElementById('qty-count').textContent = quantity;
            const total = quantity * basePrice;
            document.getElementById('total-price').textContent = total;
            document.getElementById('total-price-mobile').textContent = total;
        }

        function toggleFavorite(btn) {
            const icon = btn.querySelector('.material-symbols-outlined');
            if (icon.classList.contains('active-pill')) {
                icon.classList.remove('active-pill');
                icon.style.fontVariationSettings = "'FILL' 0";
                icon.classList.remove('text-error-red');
                icon.classList.add('text-primary');
            } else {
                icon.classList.add('active-pill');
                icon.style.fontVariationSettings = "'FILL' 1";
                icon.classList.add('text-error-red');
                icon.classList.remove('text-primary');
            }
        }

        // Header transparency scroll effect
        window.onscroll = function() {
            const nav = document.getElementById('top-nav');
            const title = document.getElementById('header-title');
            if (window.scrollY > 150) {
                nav.classList.add('bg-surface-white', 'shadow-sm');
                nav.classList.remove('bg-transparent');
                title.classList.remove('opacity-0');
            } else {
                nav.classList.remove('bg-surface-white', 'shadow-sm');
                nav.classList.add('bg-transparent');
                title.classList.add('opacity-0');
            }
        };
    </script>
</body></html>
