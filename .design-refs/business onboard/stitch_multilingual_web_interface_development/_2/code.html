<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #FCF3DC;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .onboarding-card {
            box-shadow: 0 -10px 40px rgba(0,0,0,0.05);

    body {

<body class="font-body-base text-on-background">
<!-- Header Section -->
<header class="flex justify-between items-center px-margin-standard h-nav-height">
<div class="flex items-center gap-xs">
<span class="text-primary font-headline-sm text-headline-sm">شو عبالك؟</span>
<span class="text-secondary font-label-md text-label-md bg-secondary-fixed px-2 py-0.5 rounded-full">أعمال</span>
</div>
<button class="text-on-surface-variant font-headline-sm text-headline-sm hover:opacity-70 transition-opacity">تخطي</button>
</header>
<!-- Content Area (Main Canvas) -->
<main class="flex-grow flex flex-col items-center justify-center relative px-margin-standard">
<!-- Illustration Placeholder -->
<div class="w-full max-w-sm aspect-square relative mb-section-lg">
<!-- Decorative Heritage Patterns (Simulated) -->
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, #974800 1px, transparent 0); background-size: 24px 24px;"></div>
<div class="w-full h-full rounded-3xl overflow-hidden shadow-lg border-4 border-surface-white">
<img alt="Managing restaurant orders illustration" class="w-full h-full object-cover" data-alt="A professional Palestinian merchant in a modern restaurant setting, using a sleek digital tablet to manage incoming food orders. The background features a warm, inviting kitchen with hints of traditional Middle Eastern tile work and copper cookware. The lighting is soft and golden, emphasizing a clean, high-end commercial kitchen atmosphere. The merchant looks focused and satisfied, reflecting efficiency and reliability in a warm heritage style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuALQetEkeVDsNZ2er0lr64KRfUoL1mhnpI8v0IeQecvklJun6WnvzdkjAriik_raR8NaBjRUa64dWOGXxBDbzm9xG2wyw7aX1VxbxNS3EgDR-9WrYfvvxzjkmJq6S6fD4SKgnhFj2wGbKBfLTKMWIRWwHnThQPGl3XHa7LImsVQwBWL0hKlU8H4Rm5aM_XSs2YACi80qXaK2rD-kSx5dBP0VWrO4SMtKcMWQPnW8W4Wjtur2dzkfjFJfJRL4X1ToROUeLThsItgRKZF"/>
</div>
<!-- Floating UI Elements for depth -->
<div class="absolute -bottom-4 -left-4 bg-surface-white p-3 rounded-xl shadow-md border border-border-beige flex items-center gap-sm animate-bounce" style="animation-duration: 3s;">
<span class="material-symbols-outlined text-success-green" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-md text-label-md text-on-surface">طلب جديد</span>
</div>
<div class="absolute -top-4 -right-2 bg-primary-container text-on-primary-container p-3 rounded-xl shadow-md flex items-center gap-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">trending_up</span>
<span class="font-label-md text-label-md">+24% مبيعات</span>
</div>
</div>
</main>
<!-- Bottom Content Card -->
<section class="onboarding-card bg-surface-white rounded-t-[40px] px-8 pt-10 pb-12 flex flex-col items-center text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-gap-md">أدر متجرك بكل سهولة</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-xs leading-relaxed mb-section-lg">
            استقبل الطلبات، حدّث قائمتك، وتابع مبيعاتك من مكان واحد.
        </p>
<!-- Footer Actions -->
<div class="w-full flex flex-col items-center gap-section-md">
<!-- Dots Indicator -->
<div class="flex gap-gap-sm">
<div class="w-8 h-2 rounded-full bg-primary-container transition-all duration-300"></div>
<div class="w-2 h-2 rounded-full bg-border-beige"></div>
<div class="w-2 h-2 rounded-full bg-border-beige"></div>
</div>
<!-- Primary Button -->
<button class="w-full h-[52px] bg-primary-container hover:bg-primary text-on-primary font-button-text text-button-text rounded-xl shadow-lg transition-all duration-200 active:scale-95 flex items-center justify-center gap-gap-md" onclick="handleNext()">
                التالي
                <span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
</section>
<!-- Micro-interaction Scripts -->
<script>
        function handleNext() {
            // Simple visual feedback for the button
            console.log("Navigating to step 2...");
            const btn = document.querySelector('button[onclick="handleNext()"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            setTimeout(() => {
                btn.innerHTML = 'التالي <span class="material-symbols-outlined">arrow_back</span>';
            }, 1000);
        }

        // Add subtle parallax effect on mouse/touch move
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            const illustration = document.querySelector('main .max-w-sm');
            illustration.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body></html>
