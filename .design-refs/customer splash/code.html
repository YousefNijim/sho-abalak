<style>
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes rotateSpinner {
            to { transform: rotate(360deg); }
        }
        .animate-fade-in-scale {
            animation: fadeInScale 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .animate-slide-up {
            animation: slideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
            opacity: 0;
        }
        .loading-spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(230, 120, 30, 0.1);
            border-top: 3px solid #E6781E;
            border-radius: 50%;
            animation: rotateSpinner 1s linear infinite;
        }
        .heritage-pattern {
            background-color: transparent;
            background-image:  radial-gradient(#E5E0D5 0.5px, transparent 0.5px), radial-gradient(#E5E0D5 0.5px, #FCF3DC 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 100%);
        }

<!-- Micro-interaction overlay (Flash effect) -->
<div class="fixed inset-0 bg-white opacity-0 pointer-events-none z-50 transition-opacity duration-700" id="flash-overlay"></div>
<script>
        // Subtle micro-interaction: slow reveal on page load
        window.addEventListener('load', () => {
            const overlay = document.getElementById('flash-overlay');
            // Minimalist flash to transition into the app (simulated)
            setTimeout(() => {
                // This would be the hook for navigating to the next screen
                console.log("Splash animation sequence complete.");
            }, 3000);
        });

        // Add a subtle parallax effect based on device tilt or mouse
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 100;
            const moveY = (e.clientY - window.innerHeight / 2) / 100;
            const logo = document.querySelector('.animate-fade-in-scale');
            if (logo) {
                logo.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
    </script>
