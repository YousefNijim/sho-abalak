<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #FCF3DC;
        }
        .login-card {
            box-shadow: 0 10px 25px -5px rgba(151, 72, 0, 0.1), 0 8px 10px -6px rgba(151, 72, 0, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-base text-on-background">
<!-- Header Section -->
<header class="w-full h-nav-height flex items-center justify-between px-margin-standard bg-background-cream shadow-sm z-50">
<div class="flex items-center gap-sm">
<img alt="شو عبالك؟" class="h-10 w-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAXuQi8cCjNhInAckU6ZGfReeEVDE-QncUwFc5lZJSOYf-jECJM8oXTZhaSpmyd2mfJyg52li6yzXeHVGS2EPitywomRgSJJrqDKFFNPn6bfWLdnAx6R5AWKQpnb-qGp56VvEyDBzI9Ie_qKKVFo41rZ8xt2wjW7ezVX9AYf0W7P92N4vWDb58J2IzdMaB2utzswzJPkgSqKp_zmx2USg7KcRAtxEI4PzeN61gh8G83HFukREqRkS8z8_djgZKgAvq-kemaMGmNi4ot"/>
</div>
<div class="flex flex-col items-end">
<h1 class="font-headline-sm text-headline-sm text-primary">مرحباً بك، مدير المتجر</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-standard py-section-lg">
<div class="w-full max-w-md bg-surface-white rounded-xl login-card p-8 flex flex-col gap-lg border border-border-beige">
<!-- Branding/Identity -->
<div class="text-center mb-base">
<div class="inline-flex items-center justify-center p-4 rounded-full bg-primary-fixed mb-4">
<span class="material-symbols-outlined text-primary text-3xl">storefront</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface">تسجيل الدخول للمتجر</h2>
<p class="font-body-base text-body-base text-muted-gray mt-2">يرجى إدخال بياناتك للمتابعة</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-section-md" onsubmit="return false;">
<!-- Phone Number Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant pr-1">رقم الهاتف</label>
<div class="relative flex items-center">
<input class="w-full h-[52px] bg-surface-white border-[1.5px] border-border-beige rounded-lg px-4 pt-1 text-left font-body-base focus:border-primary-container focus:ring-0 transition-colors" dir="ltr" placeholder="59XXXXXXX" type="tel"/>
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pr-3 border-r border-border-beige pointer-events-none">
<span class="font-label-md text-primary font-bold">+970</span>
</div>
<div class="absolute inset-y-0 right-0 flex items-center pr-4">
<span class="material-symbols-outlined text-muted-gray">phone_iphone</span>
</div>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center pr-1">
<label class="font-label-md text-label-md text-on-surface-variant">كلمة المرور</label>
</div>
<div class="relative flex items-center">
<input class="w-full h-[52px] bg-surface-white border-[1.5px] border-border-beige rounded-lg px-12 pt-1 font-body-base focus:border-primary-container focus:ring-0 transition-colors" id="passwordInput" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-4">
<span class="material-symbols-outlined text-muted-gray">lock</span>
</div>
<button class="absolute inset-y-0 left-0 flex items-center pl-4 text-muted-gray hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end">
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">نسيت كلمة المرور؟</a>
</div>
<!-- Login Button -->
<button class="w-full h-[52px] bg-primary-container text-on-secondary rounded-lg font-button-text text-button-text shadow-sm active:scale-95 transition-all duration-150 flex items-center justify-center gap-sm" type="submit">
<span>دخول</span>
<span class="material-symbols-outlined">login</span>
</button>
</form>
<!-- Secondary Actions -->
<div class="mt-base pt-section-md border-t border-border-beige text-center">
<p class="font-body-base text-body-base text-on-surface-variant mb-4">تواجه مشكلة في الدخول؟</p>
<a class="inline-flex items-center gap-sm px-6 py-3 border-[1.5px] border-primary text-primary rounded-lg font-button-text text-button-text hover:bg-primary-fixed-dim/20 transition-colors" href="#">
<span class="material-symbols-outlined">support_agent</span>
                    تواصل مع الدعم
                </a>
</div>
</div>
</main>
<!-- Footer Identity -->
<footer class="py-section-md text-center">
<p class="font-label-sm text-label-sm text-muted-gray">© 2024 شو عبالك - لوحة تحكم التجار</p>
</footer>
<script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('passwordIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Simple animation on load
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.login-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                card.style.transition = 'all 0.6s ease-out';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>
