<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pulse-warm {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(1.02); }
        }
        .animate-brand-pulse {
            animation: pulse-warm 4s ease-in-out infinite;
        }
        @keyframes slide-up {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up {
            animation: slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .bg-pattern {
            background-image: radial-gradient(#974800 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.05;
        }
    </style>
</head>
<body class="bg-background-cream text-on-background min-h-screen flex flex-col items-center justify-between overflow-hidden relative">
<!-- Decorative Background Elements -->
<div class="absolute inset-0 bg-pattern pointer-events-none"></div>
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 rounded-full bg-primary-fixed opacity-20 blur-3xl pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-80 h-80 rounded-full bg-secondary-container opacity-20 blur-3xl pointer-events-none"></div>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center w-full px-margin-standard z-10">
<!-- App Icon Section -->
<div class="relative group mb-8">
<div class="absolute inset-0 bg-primary-container blur-2xl opacity-20 group-hover:opacity-30 transition-opacity duration-700"></div>
<img alt="Heritage Pulse Driver App Icon" class="w-48 h-48 md:w-64 md:h-64 object-cover rounded-[40px] shadow-2xl relative animate-brand-pulse border-4 border-surface-white" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDorCEh8Gd_NN-_1qvEJDu2mtI3_DmOTLKPe4aQK3-lZ4Udr-sHBmpveuRn-V_q55CW2YVR1ao9OwmsjGUZmgRr6GS1W1BoLbOynB-W7HJBVBDz3ylG18tX9PBrrFc_RLKztx7oqFU2VEBWCGZUgR65NhHqCxmH0a96cZuXrMzUv2WeXXgqch0P1FvvLh3FfCci56WNvutgcQ8gHNldli3Z6jTvib2OBVtJY_uz6H8izOvDlvaDbY6qREPNSepA7qsH-b8du5Zaki2U"/>
</div>
<!-- Typography Section -->
<div class="text-center space-y-4 animate-slide-up" style="animation-delay: 0.2s;">
<h1 class="font-hero-lg text-hero-lg text-primary tracking-tight">
                شو عبالك؟
            </h1>
<div class="inline-flex items-center gap-2 px-4 py-1.5 bg-primary-container/10 rounded-full">
<span class="material-symbols-outlined text-primary text-[18px]">local_shipping</span>
<p class="font-headline-sm text-headline-sm text-on-primary-container">
                    تطبيق السائق
                </p>
</div>
</div>
</main>
<!-- Footer / Tagline Section -->
<footer class="w-full pb-16 px-margin-standard z-10 animate-slide-up" style="animation-delay: 0.5s;">
<div class="max-w-md mx-auto flex flex-col items-center gap-8">
<div class="h-[1.5px] w-12 bg-outline-variant opacity-50"></div>
<p class="font-body-lg text-body-lg text-on-surface-variant text-center leading-relaxed">
                انطلق وكن جزءاً من فريق التوصيل
            </p>
<!-- Loading Micro-interaction -->
<div class="flex gap-2">
<div class="w-2.5 h-2.5 rounded-full bg-primary animate-bounce" style="animation-delay: 0s;"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary animate-bounce" style="animation-delay: 0.1s;"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary animate-bounce" style="animation-delay: 0.2s;"></div>
</div>
</div>
</footer>
<!-- Interactive script for subtle movement -->
<script>
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            const icon = document.querySelector('img');
            if (icon) {
                icon.style.transform = `translate(${x}px, ${y}px)`;
            }
        });
    </script>
</body></html>
