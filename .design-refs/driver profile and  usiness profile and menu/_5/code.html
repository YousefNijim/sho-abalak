<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #FCF3DC; /* background-cream */
        }
        .heritage-card {
            background: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        .input-heritage {
            height: 52px;
            background-color: #FFFFFF;
            border: 1.5px solid #E5E0D5; /* border-beige */
            border-radius: 8px;
            padding: 0 16px;
            width: 100%;
            transition: all 0.2s;
        }
        .input-heritage:focus {
            outline: none;
            border-color: #e6781e; /* primary-container */
            box-shadow: 0 0 0 2px rgba(230, 120, 30, 0.1);
        }
        .toggle-switch {
            width: 52px;
            height: 28px;
            background-color: #E5E0D5;
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .toggle-switch.active {
            background-color: #22C55E;
        }
        .toggle-knob {
            width: 22px;
            height: 22px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            top: 3px;
            right: 3px;
            transition: transform 0.3s;
        }
        .toggle-switch.active .toggle-knob {
            transform: translateX(-24px);
        }
    </style>

<body class="bg-background-cream text-on-surface">

<main class="pb-24">

<div class="absolute bottom-0 right-0 bg-primary-container text-white p-1 rounded-full border-2 border-white cursor-pointer active:scale-90 transition-transform">

</div>
</div>
<div class="px-margin-standard space-y-gap-lg">
<!-- Availability Status Toggle -->

<div>

</div>
</div>
<div class="toggle-switch active" id="availability-toggle">
<div class="toggle-knob"></div>
</div>
</div>
<!-- Profile Info Fields -->
<section class="space-y-gap-md">
<h2 class="font-headline-sm text-headline-sm text-on-surface-variant pr-2">المعلومات الشخصية</h2>
<div class="heritage-card p-margin-standard space-y-margin-standard">
<div class="space-y-gap-xs">
<label class="font-label-md text-label-md text-muted-gray px-2">الاسم الكامل</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-muted-gray" data-icon="person">person</span>
<input class="input-heritage pr-12 font-body-lg text-body-lg" type="text" value="أحمد محمد"/>
</div>
</div>
<div class="space-y-gap-xs">
<label class="font-label-md text-label-md text-muted-gray px-2">رقم الهاتف</label>

<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="font-label-md text-label-md">المحفظة</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary rounded-xl p-gap-sm min-w-[64px] active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-md text-label-md">الحساب</span>
</a>

<script>
        const toggle = document.getElementById('availability-toggle');
        const statusText = document.getElementById('status-text');
        const statusIndicator = document.getElementById('status-indicator');

        toggle.addEventListener('click', () => {
            const isActive = toggle.classList.toggle('active');
            if (isActive) {
                statusText.innerText = 'متاح للعمل';
                statusIndicator.className = 'w-3 h-3 rounded-full bg-success-green';
            } else {
                statusText.innerText = 'غير متاح';
                statusIndicator.className = 'w-3 h-3 rounded-full bg-muted-gray';
            }
        });

        // Simple button interaction
        document.querySelector('button.bg-primary-container').addEventListener('click', function() {
            const originalContent = this.innerHTML;
            this.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="sync">sync</span>';
            setTimeout(() => {
                this.innerHTML = '<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> <span>تم الحفظ</span>';
                setTimeout(() => {
                    this.innerHTML = originalContent;
                }, 2000);
            }, 1000);
        });
    </script>
