<script>
        // Micro-interaction for image upload preview
        const uploadInput = document.getElementById('image-upload');
        const previewImg = document.getElementById('product-preview');

        uploadInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    previewImg.src = event.target.result;
                    previewImg.classList.add('animate-pulse');
                    setTimeout(() => previewImg.classList.remove('animate-pulse'), 1000);
                };
                reader.readAsDataURL(file);
            }
        });

        // Add visual feedback on save button
        const saveBtn = document.querySelector('button.bg-primary');
        saveBtn.addEventListener('click', function() {
            this.innerHTML = `<span class="animate-spin material-symbols-outlined">progress_activity</span> جارٍ الحفظ...`;
            setTimeout(() => {
                this.innerHTML = `<span class="material-symbols-outlined">check_circle</span> تم الحفظ`;
                this.classList.replace('bg-primary', 'bg-success-green');
                setTimeout(() => {
                    this.innerHTML = `حفظ التعديلات`;
                    this.classList.replace('bg-success-green', 'bg-primary');
                }, 2000);
            }, 1500);
        });
    </script>
