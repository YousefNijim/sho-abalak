<style>
        body {
            background-color: #FCF3DC;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .form-input-focus:focus-within {
            border-color: #e6781e;
            box-shadow: 0 0 0 1px #e6781e;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
<!-- Top AppBar (Predicted Component Alignment) -->
<header class="w-full top-0 sticky bg-background-cream flex items-center justify-center px-margin-standard h-nav-height z-50">
<div class="flex items-center justify-center w-full max-w-md">
<img alt="Heritage Pulse Logo" class="h-10 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuABdyES4rRxiMO8pR8TzWPXCSE8vbRZptSrzrxBXrXzwo4wGPMI80g0h5g62fwYCBXUBJ8xL6dB_xvxW0TXf4PlvaOTr0lz54kMiYUQqbfqm3qxRN1RqQZhylSZ6xWpbnq79xSHomiDqHHXUL25C5hhnhHp3NAJiOi3dO_ZiML71eCR3QMrsEtaaKQxH8wqTWZc0NFTXLIkFFiCXPRPulFOz3PlurONuy9aiBwpocrMEGS8B54Sxzu0AEtUanfWuHRzCxOxcVpijkLY"/>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-margin-standard py-section-lg w-full max-w-md mx-auto">
<!-- Welcome Section -->
<section class="text-center mb-section-lg w-full animate-fade-in">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2 tracking-tight">مرحباً بك، كابتن</h1>
<p class="font-body-base text-body-base text-on-surface-variant max-w-[80%] mx-auto">سجل دخولك لتبدأ استقبال طلبات التوصيل بكل سهولة وموثوقية</p>
</section>
<!-- Login Form Container -->
<div class="w-full space-y-gap-lg">
<!-- Phone Number Input -->
<div class="space-y-gap-xs">
<label class="block font-label-md text-label-md text-on-surface-variant px-1">رقم الهاتف المحمول</label>
<div class="relative flex items-center bg-surface-white border-[1.5px] border-border-beige rounded-xl h-[52px] px-4 form-input-focus transition-all duration-200">
<span class="material-symbols-outlined text-muted-gray mr-1">call</span>
<input class="flex-grow bg-transparent border-none focus:ring-0 text-left font-body-lg text-body-lg text-on-surface tracking-wider" dir="ltr" placeholder="59x xxx xxxx" type="tel"/>
<span class="font-bold text-primary border-r border-border-beige pr-3 mr-3 h-6 flex items-center" dir="ltr">+970</span>
</div>
</div>
<!-- Password Input -->
<div class="space-y-gap-xs">
<div class="flex justify-between items-center px-1">
<label class="block font-label-md text-label-md text-on-surface-variant">كلمة المرور</label>
<button class="font-label-md text-label-md text-secondary hover:opacity-80 transition-opacity">نسيت كلمة المرور؟</button>
</div>
<div class="relative flex items-center bg-surface-white border-[1.5px] border-border-beige rounded-xl h-[52px] px-4 form-input-focus transition-all duration-200">
<span class="material-symbols-outlined text-muted-gray mr-1">lock</span>
<input class="flex-grow bg-transparent border-none focus:ring-0 text-right font-body-lg text-body-lg text-on-surface" id="password-field" placeholder="••••••••" type="password"/>
<button class="text-muted-gray hover:text-on-surface transition-colors p-1" onclick="togglePassword()">
<span class="material-symbols-outlined" id="eye-icon">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-[52px] bg-primary-container text-on-primary font-button-text text-button-text rounded-xl shadow-md flex items-center justify-center gap-md active:scale-[0.98] transition-transform duration-150 mt-4 group">
<span class="material-symbols-outlined group-hover:translate-x-[-4px] transition-transform">arrow_forward</span>
                دخول
            </button>
</div>
<!-- Registration Link -->
<div class="mt-section-lg text-center w-full">
<div class="relative flex items-center justify-center mb-6">
<div class="w-full h-[1px] bg-border-beige"></div>
<span class="absolute bg-background-cream px-4 font-label-sm text-label-sm text-muted-gray">ليس لديك حساب؟</span>
</div>
<button class="w-full py-4 border-[1.5px] border-secondary text-secondary rounded-xl font-button-text text-button-text bg-transparent hover:bg-secondary-container/10 transition-colors flex items-center justify-center gap-sm">
<span class="material-symbols-outlined">person_add</span>
                سجل كشريك توصيل جديد
            </button>
</div>
<!-- Local Context Visual -->
<div class="mt-auto pt-section-lg flex flex-col items-center gap-gap-sm opacity-60">
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-secondary"></div>
<div class="w-2 h-2 rounded-full bg-primary-container"></div>
<div class="w-2 h-2 rounded-full bg-on-surface"></div>
</div>
<p class="font-label-sm text-label-sm text-muted-gray">Heritage Pulse v2.4 - نظام الكابتن</p>
</div>
</main>
<!-- Visual Polish: Background shapes -->
<div class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary-container/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-[-5%] left-[-10%] w-[50%] h-[50%] bg-secondary/5 rounded-full blur-3xl -z-10"></div>
<script>
        function togglePassword() {
            const passwordField = document.getElementById('password-field');
            const eyeIcon = document.getElementById('eye-icon');
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                eyeIcon.innerText = 'visibility_off';
            } else {
                passwordField.type = 'password';
                eyeIcon.innerText = 'visibility';
            }
        }

        // Simple scale interaction for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('scale-[0.97]'));
            btn.addEventListener('mouseup', () => btn.classList.remove('scale-[0.97]'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('scale-[0.97]'));
        });
    </script>
</body></html>
