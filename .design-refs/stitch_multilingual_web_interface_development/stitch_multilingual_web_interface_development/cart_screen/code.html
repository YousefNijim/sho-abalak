<script>
        // Simple micro-interactions for quantity controls
        document.querySelectorAll('.flex.items-center.bg-surface-container').forEach(container => {
            const countSpan = container.querySelector('.font-bold');
            const plusBtn = container.querySelector('button:first-child');
            const minusBtn = container.querySelector('button:last-child');
            
            plusBtn.addEventListener('click', () => {
                let count = parseInt(countSpan.textContent);
                countSpan.textContent = count + 1;
            });
            
            minusBtn.addEventListener('click', () => {
                let count = parseInt(countSpan.textContent);
                if (count > 1) {
                    countSpan.textContent = count - 1;
                }
            });
        });

        // Payment radio interaction feedback
        const paymentLabels = document.querySelectorAll('input[name="payment"]');
        paymentLabels.forEach(input => {
            input.addEventListener('change', () => {

            });
