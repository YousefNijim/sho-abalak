<style>
        body {
            background-color: #FCF3DC;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-focus-effect:focus-within {
            border-color: #974800;
            box-shadow: 0 0 0 1px #974800;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="font-body-base text-on-surface">
<!-- Top AppBar (Identity Anchor) -->
<header class="bg-background-cream text-primary font-headline-lg-mobile text-headline-lg-mobile docked full-width top-0 shadow-sm flex flex-row-reverse justify-between items-center px-margin-standard h-nav-height w-full z-50">
<div class="flex items-center gap-sm transition-transform active:scale-95 cursor-pointer">
<span class="material-symbols-outlined text-primary" data-icon="arrow_forward">arrow_forward</span>
</div>
<div class="font-headline-lg-mobile text-headline-lg-mobile">شو عبالك؟</div>
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-on-primary-container" data-icon="person_add">person_add</span>
</div>
</header>
<main class="flex-grow flex flex-col px-margin-standard py-section-lg max-w-md mx-auto w-full">
<!-- Hero Section -->
<div class="mb-section-md text-center">
<h1 class="font-headline-md text-headline-md text-primary mb-2">إنشاء حساب جديد</h1>
<p class="font-body-base text-on-surface-variant">انضم إلينا واستمتع بأشهى المأكولات والخدمات في فلسطين</p>
</div>
<!-- Registration Form -->
<form class="space-y-gap-lg">
<!-- Full Name -->
<div class="space-y-gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-1">الاسم الكامل</label>
<div class="h-[52px] bg-surface-white border-[1.5px] border-border-beige rounded-xl flex items-center px-margin-standard transition-all input-focus-effect">
<span class="material-symbols-outlined text-muted-gray ml-3" data-icon="person">person</span>
<input class="bg-transparent border-none focus:ring-0 flex-grow text-body-base font-body-base outline-none text-right" placeholder="أدخل اسمك الكامل" type="text"/>
</div>
</div>
<!-- Phone Number -->
<div class="space-y-gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-1">رقم الهاتف</label>
<div class="h-[52px] bg-surface-white border-[1.5px] border-border-beige rounded-xl flex items-center px-margin-standard transition-all input-focus-effect" dir="ltr">
<span class="font-body-base font-bold text-primary border-r border-border-beige pr-3 mr-3">+970</span>
<input class="bg-transparent border-none focus:ring-0 flex-grow text-body-base font-body-base outline-none" placeholder="59XXXXXXX" type="tel"/>
<span class="material-symbols-outlined text-muted-gray ml-2" data-icon="phone_iphone">phone_iphone</span>
</div>
</div>
<!-- Area Dropdown -->
<div class="space-y-gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-1">المنطقة</label>
<div class="relative h-[52px] bg-surface-white border-[1.5px] border-border-beige rounded-xl flex items-center px-margin-standard transition-all input-focus-effect">
<span class="material-symbols-outlined text-muted-gray ml-3" data-icon="location_on">location_on</span>
<select class="bg-transparent border-none focus:ring-0 flex-grow text-body-base font-body-base outline-none appearance-none cursor-pointer text-right">
<option disabled="" selected="" value="">اختر مدينتك</option>
<option>رام الله</option>
<option>نابلس</option>
<option>الخليل</option>
<option>بيت لحم</option>
<option>جنين</option>
<option>طولكرم</option>
</select>
<span class="material-symbols-outlined text-muted-gray mr-auto pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Password -->
<div class="space-y-gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-1">كلمة المرور</label>
<div class="h-[52px] bg-surface-white border-[1.5px] border-border-beige rounded-xl flex items-center px-margin-standard transition-all input-focus-effect">
<span class="material-symbols-outlined text-muted-gray ml-3" data-icon="lock">lock</span>
<input class="bg-transparent border-none focus:ring-0 flex-grow text-body-base font-body-base outline-none text-right" placeholder="كلمة المرور" type="password"/>
<span class="material-symbols-outlined text-muted-gray cursor-pointer" data-icon="visibility">visibility</span>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-1">تأكيد كلمة المرور</label>
<div class="h-[52px] bg-surface-white border-[1.5px] border-border-beige rounded-xl flex items-center px-margin-standard transition-all input-focus-effect">
<span class="material-symbols-outlined text-muted-gray ml-3" data-icon="lock_reset">lock_reset</span>
<input class="bg-transparent border-none focus:ring-0 flex-grow text-body-base font-body-base outline-none text-right" placeholder="أعد إدخال كلمة المرور" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-sm pt-2">
<input class="mt-1 w-5 h-5 rounded border-border-beige text-primary focus:ring-primary-container" id="terms" type="checkbox"/>
<label class="font-label-md text-label-md text-on-surface-variant leading-relaxed" for="terms">
                    أوافق على <span class="text-primary font-bold cursor-pointer">الشروط والأحكام</span> و <span class="text-primary font-bold cursor-pointer">سياسة الخصوصية</span> الخاصة بشو عبالك.
                </label>
</div>
<!-- Submit Button -->
<button class="w-full h-[52px] bg-primary-container text-on-primary-container font-button-text text-button-text rounded-xl shadow-lg transition-all active:scale-[0.98] hover:opacity-90 mt-4" type="submit">
                إنشاء حساب
            </button>
</form>
<!-- Login Link -->
<div class="mt-section-md text-center">
<p class="font-body-base text-on-surface-variant">
                عندك حساب؟ 
                <a class="text-primary font-bold mr-1 underline decoration-primary-fixed decoration-2 underline-offset-4" href="#">سجّل دخول</a>
</p>
</div>
<!-- Visual Decoration / Heritage Touch -->
<div class="mt-auto pt-section-lg flex justify-center opacity-20 grayscale pointer-events-none">
<div class="w-full h-24 relative overflow-hidden flex justify-center items-center">
<img class="h-full object-contain opacity-40" data-alt="An intricate Palestinian tatreez embroidery pattern border design with traditional geometric motifs. The visual style is minimalist and refined using a monochromatic sepia and warm cream palette. The lighting is even and flat creating a subtle background texture that evokes cultural heritage and authentic hospitality in a modern UI context." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDlsqdL2okG3UAb0LNFcpDvuhV8FuenzbYSkaaHCQYbZtuKvPUXnJ5_fg16BZXFA26McnF9m2ZGvxJmPTX8w949vaFl_vjqlEAwXcSb2JdznUQqEETy2KpzDKzakaOzrdt0-czTBRsKRoa6b4MCdaXXEXORs-_XvkNgcIfITY6X1-rMnbfkw7fOMGUHmD0vcJlQlWB02OdqL-3O7tgFTv15DRyRAshRvFNtxRH3m6wFTlADUCxieOhLhg8mcNsfjr-YLep7XyGssdTj"/>
</div>
</div>
</main>
<script>
        // Micro-interaction for password visibility
        const passwordFields = document.querySelectorAll('input[type="password"]');
        document.querySelectorAll('[data-icon="visibility"]').forEach((icon, index) => {
            icon.addEventListener('click', () => {
                const input = passwordFields[index];
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        });

        // Simple form validation visual feedback
        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" style="font-size: 20px;">sync</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.disabled = false;
                alert('شكراً لتسجيلك! سيتم توجيهك قريباً.');
            }, 1500);
        });
    </script>
</body></html>
