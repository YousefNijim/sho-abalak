<script>
        function switchTab(type) {
            const currentBtn = document.getElementById('tab-current');
            const previousBtn = document.getElementById('tab-previous');
            const currentOrders = document.querySelectorAll('.current-order');
            const previousOrders = document.querySelectorAll('.previous-order');

            if (type === 'current') {
                currentBtn.classList.add('tab-active');
                currentBtn.classList.remove('text-muted-gray');
                previousBtn.classList.remove('tab-active');
                previousBtn.classList.add('text-muted-gray');
                
                currentOrders.forEach(el => el.classList.remove('hidden'));
                previousOrders.forEach(el => el.classList.add('hidden'));
            } else {
                previousBtn.classList.add('tab-active');
                previousBtn.classList.remove('text-muted-gray');
                currentBtn.classList.remove('tab-active');
                currentBtn.classList.add('text-muted-gray');
                
                currentOrders.forEach(el => el.classList.add('hidden'));
                previousOrders.forEach(el => el.classList.remove('hidden'));
            }
        }

        // Initialize view with 'current' orders hidden or shown appropriately? 
        // Let's show all by default or default to current.
        switchTab('current');
    </script>
