<body class="font-body-base text-on-surface min-h-screen flex flex-col items-center justify-center p-margin-standard overflow-hidden relative">

<!-- Main Container -->

<!-- Header Section -->

<div class="mb-gap-md transform transition-transform hover:scale-105 duration-300">
<img alt="شو عبالك؟" class="h-24 w-auto drop-shadow-md" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDpp8Ke2yW1egfqNG7LWPhwygH71jwaPzZ-M07JKj0jtTIW_EJpIAiq9zycpbtK69shhkwr051R249Z9uhf31YI-uLiR9z_0r1xpLXbpgBn0gbdDI8V7qldKtrlEDHc-tFzSl2lpoioAYz07fJVMp8WtZ4o1pfps2JMvqnDG6euykm7wi7_I5bu3MD2aACv-_77YB-ikTK1XILu0cXxPTRjkH9Q5otOAHn4y07lyIq2n-yRVyF9Qeb2okmUpL4ipRHnSpDfdXMZcmPh"/>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-base">مرحباً بك</h1>

<!-- Login Form -->
<div class="glass-card p-section-md rounded-xl shadow-lg">

<!-- Phone Input -->
<div class="space-y-base">

<div class="relative flex items-center">

<span class="material-symbols-outlined text-lg">phone_iphone</span>
</div>
<input class="w-full h-[52px] pr-12 pl-20 bg-surface-white border-[1.5px] border-border-beige rounded-lg focus:border-primary focus:ring-0 transition-colors font-body-base text-right" dir="ltr" placeholder="59XXXXXXX" required="" type="tel"/>
<div class="absolute left-0 h-full flex items-center pl-4 pr-3 border-r border-border-beige text-primary font-bold" dir="ltr">
                            +970
                        </div>
</div>
</div>
<!-- Password Input -->
<div class="space-y-base">
<div class="flex justify-between items-center px-1">
<label class="block font-label-md text-label-md text-on-surface-variant">كلمة المرور</label>
<a class="text-primary font-label-sm text-label-sm hover:underline decoration-1 underline-offset-4" href="#">نسيت كلمة المرور؟</a>
</div>
<div class="relative flex items-center">
<div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-muted-gray">
<span class="material-symbols-outlined text-lg">lock</span>
</div>
<input class="w-full h-[52px] px-12 bg-surface-white border-[1.5px] border-border-beige rounded-lg focus:border-primary focus:ring-0 transition-colors font-body-base" placeholder="••••••••" required="" type="password"/>
<button class="absolute left-0 inset-y-0 flex items-center pl-4 text-muted-gray hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>

<button class="w-full h-[52px] bg-primary-container text-on-primary-container font-button-text text-button-text rounded-lg shadow-md hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-sm mt-section-md" type="submit">
<span>دخول</span>
<span class="material-symbols-outlined">login</span>
</button>

<!-- Simple Micro-interaction script -->
<script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Loading State Animation
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                // Add a simple feedback
                const notification = document.createElement('div');
                notification.className = 'fixed top-4 left-1/2 -translate-x-1/2 bg-success-green text-white px-6 py-3 rounded-full shadow-lg font-bold z-50 animate-bounce';
                notification.innerText = 'تم تسجيل الدخول بنجاح!';
                document.body.appendChild(notification);
                setTimeout(() => notification.remove(), 3000);
            }, 1500);
        });

        // Visibility toggle
        const toggleBtn = document.querySelector('button[type="button"]');
        const passInput = document.querySelector('input[type="password"]');
        toggleBtn.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            toggleBtn.innerHTML = `<span class="material-symbols-outlined text-lg">${isPass ? 'visibility_off' : 'visibility'}</span>`;
        });
    </script>
<style>
        @keyframes fade-in {

            to { opacity: 1; transform: translateY(0); }
        }

            animation: fade-in 0.6s ease-out forwards;
        }
