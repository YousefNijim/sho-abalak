<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        @keyframes spin-saffron {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-brand-pulse {
            animation: pulse-soft 3s ease-in-out infinite;
        }

        .spinner-container {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(230, 120, 30, 0.1);
            border-top: 4px solid #E6781E;
            border-radius: 50%;
            animation: spin-saffron 1s linear infinite;
        }

            overflow: hidden;
        }

            منصة طلباتك
        </p>
</footer>
<!-- Micro-interaction for Splash Transitions -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Simulated loading progress or entry animation
            const mainContent = document.querySelector('main');
            const footer = document.querySelector('footer');
            
            // Initial state
            mainContent.style.opacity = '0';
            mainContent.style.transform = 'translateY(20px)';
            footer.style.opacity = '0';
            
            // Trigger entry
            setTimeout(() => {
                mainContent.style.transition = 'all 1s cubic-bezier(0.22, 1, 0.36, 1)';
                mainContent.style.opacity = '1';
                mainContent.style.transform = 'translateY(0)';
                
                footer.style.transition = 'opacity 0.8s ease-out 0.5s';
                footer.style.opacity = '1';
            }, 100);

            // Optional: Auto-redirect logic would go here
            // setTimeout(() => { window.location.href = '/home'; }, 3500);
        });
    </script>
