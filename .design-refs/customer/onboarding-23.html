<body class="bg-background-cream text-on-surface min-h-screen overflow-hidden">

<div class="h-2 w-8 rounded-full bg-primary transition-all duration-300" id="dot2"></div>
<div class="h-2 w-2 rounded-full bg-border-beige transition-all duration-300" id="dot3"></div>
</div>
<!-- Primary Action -->

<button class="h-[52px] w-full bg-primary text-on-primary font-button-text text-button-text rounded-xl shadow-lg active:scale-95 transition-all flex items-center justify-center" id="nextBtn">
<span>التالي</span>
<span class="material-symbols-outlined mr-gap-sm">arrow_back</span>
</button>
<button class="h-[52px] w-full border-[1.5px] border-primary text-primary font-button-text text-button-text rounded-xl active:scale-95 transition-all" id="backBtn">السابق</button>

<script>
        let currentSlide = 0; // 0 for Slide 2, 1 for Slide 3
        const slider = document.getElementById('slider');
        const nextBtn = document.getElementById('nextBtn');
        const backBtn = document.getElementById('backBtn');
        const dot1 = document.getElementById('dot1');
        const dot2 = document.getElementById('dot2');
        const dot3 = document.getElementById('dot3');

        function updateUI() {
            // Update Slider Position
            slider.style.transform = `translateX(${currentSlide * 100}%)`;

            // Update Dots (Index shifted because we start at logical slide 2)
            if (currentSlide === 0) {
                dot1.className = "h-2 w-2 rounded-full bg-border-beige transition-all duration-300";
                dot2.className = "h-2 w-8 rounded-full bg-primary transition-all duration-300";
                dot3.className = "h-2 w-2 rounded-full bg-border-beige transition-all duration-300";
                nextBtn.querySelector('span').innerText = "التالي";
            } else {
                dot1.className = "h-2 w-2 rounded-full bg-border-beige transition-all duration-300";
                dot2.className = "h-2 w-2 rounded-full bg-border-beige transition-all duration-300";
                dot3.className = "h-2 w-8 rounded-full bg-primary transition-all duration-300";
                nextBtn.querySelector('span').innerText = "ابدأ الآن";
            }
        }

        nextBtn.addEventListener('click', () => {
            if (currentSlide < 1) {
                currentSlide++;
                updateUI();
            } else {
                // Navigate to main app or login
                alert('الانتقال إلى التطبيق...');
            }
        });

        backBtn.addEventListener('click', () => {
            if (currentSlide > 0) {
                currentSlide--;
                updateUI();
            } else {
                // Return to first slide (not in this view)
                console.log('Returning to first slide...');
            }
        });

        // Touch handling for mobile swiping
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            if (touchEndX < touchStartX - 50) { // Swipe Left (in RTL) = Back
                if (currentSlide > 0) {
                    currentSlide--;
                    updateUI();
                }
            }
            if (touchEndX > touchStartX + 50) { // Swipe Right (in RTL) = Next
                if (currentSlide < 1) {
                    currentSlide++;
                    updateUI();
                }
            }
        }
    </script>
