services:
  postgres:
    image: postgres:16-alpine
    container_name: shu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shu
      POSTGRES_PASSWORD: shu_password
      POSTGRES_DB: shu_abalak
    ports:
      # Host 5433 to avoid clashing with a native Postgres on 5432; container stays 5432.
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shu_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
