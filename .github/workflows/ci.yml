name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shu
          POSTGRES_PASSWORD: shu_password
          POSTGRES_DB: shu_abalak
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @shu/api prisma:generate
        env:
          DATABASE_URL: postgresql://shu:shu_password@localhost:5432/shu_abalak

      - name: Build shared packages
        run: |
          pnpm --filter @shu/shared-types build
          pnpm --filter @shu/utils build

      - name: Run typechecks and builds across monorepo
        run: pnpm build
        env:
          DATABASE_URL: postgresql://shu:shu_password@localhost:5432/shu_abalak
          JWT_SECRET: test-secret-change-me-in-production
